site_name: "3D Laser Scanner"
site_description: "Documentation for the 3D Laser Scanner project, a Python package for processing and analyzing 3D point cloud data."
site_author: "Gianmaria Pizzo"
site_url: "https://github.com/PayThePizzo/Development-Methodologies-Afternotes"
repo_name: "PayThePizzo/Development-Methodologies-Afternotes"
repo_url: "https://github.com/PayThePizzo/Development-Methodologies-Afternotes"

watch: [mkdocs.yml, README.md, src, config, tests]

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

nav:
- Home: index.md
- Getting Started:
  - Installation: getting_started/installation.md
  - Configuration: getting_started/configuration.md
  - Usage: getting_started/usage.md
- How It Works:
  - Pipeline Overview: concepts/pipeline.md
  - Camera Calibration: concepts/calibration.md
  - Laser Line Detection: concepts/laser_detection.md
  - Reference Plane Detection: concepts/plane_detection.md
  - 3D Triangulation: concepts/triangulation.md
- API Reference:
  - geometry: reference/geometry.md
  - calibration: reference/calibration.md
  - detection: reference/detection.md
  - visualization: reference/visualization.md
  - CamViewer: reference/camviewer.md
  - scanner_interface: reference/scanner_interface.md
  - config_parser: reference/config_parser.md
- Testing:
  - Overview: testing/overview.md
  - Geometry tests: testing/test_geometry.md
  - Detection tests: testing/test_detection.md

theme:
  name: dracula
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy

plugins:
- search
- autorefs
# - macros
- mermaid2
# - panzoom
# - mkdocs-video
- mkdocstrings:
    enabled: true
    handlers:
      python:
        setup_commands:
          - import sys
          - sys.path.append("src")
          - sys.path.append("config")
          - sys.path.append("tests")
        import:
        - https://docs.python-requests.org/en/master/objects.inv
        - https://docs.python.org/3/objects.inv
        - https://mkdocstrings.github.io/objects.inv
        - https://mkdocstrings.github.io/autorefs/objects.inv
        - https://mkdocstrings.github.io/griffe/objects.inv
        - https://python-markdown.github.io/objects.inv
        paths: [src, tests, config, .]
        options:
          docstring_options:
            ignore_init_summary: true
          docstring_style: google
          docstring_section_style: list
          heading_level: 2
          inherited_members: true
          merge_init_into_class: true
          parameter_headings: true
          separate_signature: true
          show_bases: false
          show_inheritance_diagram: true
          show_root_heading: true
          show_root_full_path: false
          show_source: true
          show_signature_annotations: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          signature_crossrefs: true
          summary: true
